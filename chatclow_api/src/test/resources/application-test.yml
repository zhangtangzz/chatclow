# 测试环境配置 — H2 内存数据库，不污染 MySQL

spring:
  datasource:
    url: jdbc:h2:mem:chatclow_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mongodb:
  enabled: false

pgvector:
  enabled: false

rag:
  embedding:
    api-url: https://mock-embedding.example.com
    api-key: test-key
    model: test-model

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
